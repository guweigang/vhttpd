name: Build vhttpd binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'dbsrc/**'
      - 'Makefile'
      - 'v.mod'
      - '.github/workflows/vhttpd-binaries.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'dbsrc/**'
      - 'Makefile'
      - 'v.mod'
      - '.github/workflows/vhttpd-binaries.yml'

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    env:
      VHTTPD_VJSX_ROOT: /usr/local/share/vhttpd/vjsx
      V_REPO: https://github.com/guweigang/vlang
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: macos-15-intel
            target: macos-amd64
          - os: macos-15
            target: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            default-libmysqlclient-dev \
            libpq-dev \
            libsqlite3-dev \
            libgc-dev \
            patchelf \
            pkg-config \
            libssl-dev

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          brew install bdw-gc libpq mysql-client openssl@3 pkg-config sqlite

      - name: Configure Homebrew build env (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mysql_prefix="$(brew --prefix mysql-client)"
          libpq_prefix="$(brew --prefix libpq)"
          openssl_prefix="$(brew --prefix openssl@3)"
          {
            echo "PKG_CONFIG_PATH=${mysql_prefix}/lib/pkgconfig:${libpq_prefix}/lib/pkgconfig:${openssl_prefix}/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
            echo "CPPFLAGS=-I${mysql_prefix}/include/mysql -I${libpq_prefix}/include -I${openssl_prefix}/include ${CPPFLAGS:-}"
            echo "LDFLAGS=-L${mysql_prefix}/lib -L${libpq_prefix}/lib -L${openssl_prefix}/lib ${LDFLAGS:-}"
          } >> "$GITHUB_ENV"

      - name: Install V compiler
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.target }}" in
            linux-amd64) bootstrap_url="https://github.com/vlang/v/releases/download/0.5.1/v_linux.zip" ;;
            macos-amd64) bootstrap_url="https://github.com/vlang/v/releases/download/0.5.1/v_macos_x86_64.zip" ;;
            macos-arm64) bootstrap_url="https://github.com/vlang/v/releases/download/0.5.1/v_macos_arm64.zip" ;;
            *) echo "unsupported target: ${{ matrix.target }}"; exit 1 ;;
          esac
          curl -fsSL "$bootstrap_url" -o /tmp/v-bootstrap.zip
          rm -rf /tmp/v-bootstrap
          unzip -q /tmp/v-bootstrap.zip -d /tmp/v-bootstrap
          rm -rf /tmp/v
          git clone "$V_REPO" /tmp/v
          chmod +x /tmp/v-bootstrap/v/v
          (
            cd /tmp/v
            /tmp/v-bootstrap/v/v -cc cc -o v cmd/v
            ./v -cc cc -o v cmd/v
          )
          chmod +x /tmp/v/v
          echo "/tmp/v" >> "$GITHUB_PATH"

      - name: Checkout vjsx module
        shell: bash
        run: |
          set -euo pipefail
          sudo mkdir -p "$(dirname "$VHTTPD_VJSX_ROOT")"
          sudo chown "$USER" "$(dirname "$VHTTPD_VJSX_ROOT")"
          rm -rf "$VHTTPD_VJSX_ROOT"
          git clone --depth=1 https://github.com/guweigang/vjsx "$VHTTPD_VJSX_ROOT"
          mkdir -p "$HOME/.vmodules"
          rm -rf "$HOME/.vmodules/vjsx"
          ln -s "$VHTTPD_VJSX_ROOT" "$HOME/.vmodules/vjsx"

      - name: Checkout QuickJS source
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/bellard/quickjs /tmp/quickjs

      - name: Install QuickJS archive into vjsx libs
        shell: bash
        run: |
          set -euo pipefail
          make -C /tmp/quickjs libquickjs.a
          case "${{ matrix.target }}" in
            linux-amd64)
              cp /tmp/quickjs/libquickjs.a "$VHTTPD_VJSX_ROOT/libs/qjs_linux_x64.a"
              ;;
            macos-amd64)
              cp /tmp/quickjs/libquickjs.a "$VHTTPD_VJSX_ROOT/libs/qjs_macos_x64.a"
              ;;
            macos-arm64)
              cp /tmp/quickjs/libquickjs.a "$VHTTPD_VJSX_ROOT/libs/qjs_macos_arm64.a"
              ;;
            *)
              echo "unsupported quickjs archive install target: ${{ matrix.target }}"
              exit 1
              ;;
          esac

      - name: Show toolchain
        shell: bash
        run: |
          set -euo pipefail
          v version
          cc --version || clang --version
          pkg-config --modversion bdw-gc
          pkg-config --modversion openssl

      - name: Build production binary
        shell: bash
        run: |
          set -euo pipefail
          make prod VPHP_V_GC=boehm WITH_DB=1

      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail
          ./vhttpd --help >/dev/null
          if ./vhttpd -1 >/dev/null 2>&1; then
            echo "expected unknown option to fail"
            exit 1
          fi

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          bundle="vhttpd-${{ matrix.target }}"
          mkdir -p "$bundle/scripts" "$bundle/runtime"
          cp ./vhttpd "$bundle/"
          bash ./scripts/bundle_runtime_libs.sh "$bundle/vhttpd" "$bundle/runtime/libs"
          cp ./README.md "$bundle/README.md"
          cp ./scripts/install_runtime.sh "$bundle/scripts/install_runtime.sh"
          cp ./scripts/runtime_doctor.sh "$bundle/scripts/runtime_doctor.sh"
          cp ./scripts/bundle_runtime_libs.sh "$bundle/scripts/bundle_runtime_libs.sh"
          chmod +x "$bundle/scripts/install_runtime.sh" "$bundle/scripts/runtime_doctor.sh" "$bundle/scripts/bundle_runtime_libs.sh"
          tar -czf "$bundle.tar.gz" "$bundle"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vhttpd-${{ matrix.target }}
          path: vhttpd-${{ matrix.target }}.tar.gz
          if-no-files-found: error
