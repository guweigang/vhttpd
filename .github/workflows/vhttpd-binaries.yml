name: Build vhttpd binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'dbsrc/**'
      - 'Makefile'
      - 'v.mod'
      - '.github/workflows/vhttpd-binaries.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'dbsrc/**'
      - 'Makefile'
      - 'v.mod'
      - '.github/workflows/vhttpd-binaries.yml'

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: macos-15-intel
            target: macos-amd64
          - os: macos-15
            target: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libssl-dev

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          brew install openssl@3 pkg-config

      - name: Install V compiler
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.target }}" in
            linux-amd64) v_url="https://github.com/vlang/v/releases/download/0.5.1/v_linux.zip" ;;
            macos-amd64) v_url="https://github.com/vlang/v/releases/download/0.5.1/v_macos_x86_64.zip" ;;
            macos-arm64) v_url="https://github.com/vlang/v/releases/download/0.5.1/v_macos_arm64.zip" ;;
            *) echo "unsupported target: ${{ matrix.target }}"; exit 1 ;;
          esac
          curl -fsSL "$v_url" -o /tmp/v.zip
          rm -rf /tmp/v
          unzip -q /tmp/v.zip -d /tmp
          chmod +x /tmp/v/v
          echo "/tmp/v" >> "$GITHUB_PATH"

      - name: Checkout vjsx module
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/guweigang/vjsx /tmp/vjsx

      - name: Checkout QuickJS source (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/bellard/quickjs /tmp/quickjs

      - name: Link vjsx module
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.vmodules"
          rm -rf "$HOME/.vmodules/vjsx"
          ln -s /tmp/vjsx "$HOME/.vmodules/vjsx"

      - name: Show toolchain
        shell: bash
        run: |
          set -euo pipefail
          v version
          cc --version || clang --version
          pkg-config --modversion openssl

      - name: Build production binary
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ runner.os }}" = "Linux" ]; then
            VJS_QUICKJS_PATH=/tmp/quickjs \
            make prod V_FLAGS="-d use_openssl -d build_quickjs"
          else
            make prod
          fi

      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail
          ./vhttpd --help >/dev/null
          if ./vhttpd -1 >/dev/null 2>&1; then
            echo "expected unknown option to fail"
            exit 1
          fi

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          bundle="vhttpd-${{ matrix.target }}"
          mkdir -p "$bundle"
          cp ./vhttpd "$bundle/"
          cp ./README.md "$bundle/README.md"
          tar -czf "$bundle.tar.gz" "$bundle"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vhttpd-${{ matrix.target }}
          path: vhttpd-${{ matrix.target }}.tar.gz
          if-no-files-found: error
