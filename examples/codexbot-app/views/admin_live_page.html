<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  {{raw:live_script}}
  <style>
    :root {
      --bg: #f2eee6;
      --panel: rgba(255, 251, 245, 0.95);
      --ink: #1d2733;
      --muted: #66707c;
      --line: #d7c9b6;
      --ok: #0f766e;
      --warn: #b45309;
      --bad: #b42318;
      --shadow: 0 20px 60px rgba(29, 39, 51, 0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Iowan Old Style", "Palatino Linotype", serif;
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 30%),
        radial-gradient(circle at top right, rgba(180, 83, 9, 0.12), transparent 24%),
        linear-gradient(180deg, #faf7f1 0%, var(--bg) 100%);
    }
    main {
      max-width: 1240px;
      margin: 0 auto;
      padding: 40px 20px 64px;
    }
    .hero, .panel {
      border: 1px solid var(--line);
      border-radius: 26px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .hero {
      padding: 28px;
      margin-bottom: 22px;
    }
    .eyebrow {
      margin: 0 0 8px;
      color: var(--ok);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 12px;
    }
    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 68px);
      line-height: 0.92;
    }
    .lede {
      max-width: 760px;
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.7;
    }
    .flash {
      margin: 14px 0 0;
      min-height: 1.4em;
      color: var(--ok);
      font-weight: 700;
    }
    .flash[data-vphp-flash="error"] { color: var(--bad); }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }
    .meta span {
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      font-size: 14px;
    }
    .grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      margin: 0 0 22px;
    }
    .panel {
      padding: 20px;
    }
    .panel h2 {
      margin: 0 0 14px;
      font-size: 24px;
    }
    .stack {
      display: grid;
      gap: 12px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.74);
    }
    .card strong {
      display: block;
      margin-bottom: 6px;
      font-size: 16px;
    }
    .card p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }
    .tone-ok { border-color: rgba(15, 118, 110, 0.30); }
    .tone-warn { border-color: rgba(180, 83, 9, 0.34); }
    .tone-bad { border-color: rgba(180, 35, 24, 0.30); }
    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 14px;
    }
    .section-title span {
      color: var(--muted);
      font-size: 14px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      cursor: pointer;
      color: white;
      background: var(--ink);
    }
    button.alt {
      background: white;
      color: var(--ink);
      border: 1px solid var(--line);
    }
    form {
      display: grid;
      gap: 12px;
    }
    label {
      display: grid;
      gap: 6px;
      font-size: 14px;
      color: var(--muted);
    }
    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      background: white;
      color: var(--ink);
    }
    textarea {
      min-height: 108px;
      resize: vertical;
    }
    .error {
      min-height: 1.4em;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .hint {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin: 0;
    }
    @media (max-width: 700px) {
      main { padding-inline: 14px; }
      .hero, .panel { border-radius: 20px; }
    }
  </style>
</head>
<body>
  <main id="admin-live-root" {{raw:live_attrs}}>
    {{include:admin_live_panel.html}}
  </main>
</body>
</html>
