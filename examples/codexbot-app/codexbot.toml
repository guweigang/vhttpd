[server]
host = "127.0.0.1"
port = 19881

[files]
pid_file = "/tmp/vhttpd_${server.port}.pid"
event_log = "/tmp/vhttpd_${server.port}.events.ndjson"

[runtime]
timezone = "Asia/Shanghai"

[worker]
read_timeout_ms = 3000
autostart = true
pool_size = 4
socket_prefix = "/tmp/vslim_worker"
max_requests = 5000
restart_backoff_ms = 500
restart_backoff_max_ms = 8000
cmd = "php -d extension=/Users/guweigang/Source/vphpx/vslim/vslim.so /Users/guweigang/Source/vhttpd/php/package/bin/php-worker"

[worker.env]
VHTTPD_APP = "/Users/guweigang/Source/vhttpd/examples/codexbot-app.php"
VHTTPD_BOT_TZ = "Asia/Shanghai"
VHTTPD_ADMIN_BASE_URL = "http://127.0.0.1:19981"
VHTTPD_ADMIN_TOKEN = "change-me"

[admin]
host = "127.0.0.1"
port = 19981
token = "change-me"

[feishu]
enabled = true
open_base_url = "https://open.feishu.cn/open-apis"
reconnect_delay_ms = 3000
token_refresh_skew_seconds = 60
recent_event_limit = 20

[feishu.main]
app_id = "${env.FEISHU_APP_ID:-}"
app_secret = "${env.FEISHU_APP_SECRET:-}"
verification_token = "${env.FEISHU_VERIFICATION_TOKEN:-}"
encrypt_key = "${env.FEISHU_ENCRYPT_KEY:-}"

[codex]
enabled = true
url = "${env.CODEX_URL:-ws://127.0.0.1:4500}"
model = "gpt-5.4"
effort = "medium"
# fallback project folder
cwd = "/Users/guweigang/codex/default"
approval_policy = "never"
#`dangerFullAccess`, `readOnly`, `externalSandbox`, `workspaceWrite`
sandbox = "workspaceWrite"
reconnect_delay_ms = 3000
flush_interval_ms = 400
