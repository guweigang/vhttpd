[paths]
root = "../../"
vjsx_app = "examples/feishu_cb-app-ts/app.mts"
vjsx_build_root = "tmp/feishu-cb-vjsx-build"

[files]
pid_file = "tmp/vhttpd_feishu_cb_remote.pid"
event_log = "tmp/vhttpd_feishu_cb_remote.events.ndjson"

[runtime]
timezone = "Asia/Shanghai"

[admin]
host = "127.0.0.1"
port = 19984
token = "change-me"

[feishu]
enabled = true
open_base_url = "https://open.feishu.cn/open-apis"
reconnect_delay_ms = 3000
token_refresh_skew_seconds = 60
recent_event_limit = 20
app_id = "${env.FEISHU_APP_ID:-}"
app_secret = "${env.FEISHU_APP_SECRET:-}"
verification_token = "${env.FEISHU_VERIFICATION_TOKEN:-}"
encrypt_key = "${env.FEISHU_ENCRYPT_KEY:-}"

[feishu.bridge]
enabled = true
token = "${env.VHTTPD_BRIDGE_TOKEN:-change-me}"
target_id = "local-main"

[sites.feishu_cb]
host = "0.0.0.0"
port = 19884
root = "examples/feishu_cb-app-ts"
executor = "vjsx"
app = "${paths.vjsx_app}"
vjsx.build_root = "${paths.vjsx_build_root}"
vjsx.runtime_profile = "node"
vjsx.thread_count = 1
vjsx.enable_fs = false
