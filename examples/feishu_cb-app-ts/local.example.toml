[paths]
root = "../../"
vjsx_app = "examples/codexbot-app-ts/app.mts"
vjsx_build_root = "tmp/codexbot-vjsx-build"

[files]
pid_file = "tmp/vhttpd_codexbot_local.pid"
event_log = "tmp/vhttpd_codexbot_local.events.ndjson"

[runtime]
timezone = "Asia/Shanghai"

[admin]
host = "127.0.0.1"
port = 19983
token = "change-me"

[feishu]
enabled = true
open_base_url = "https://open.feishu.cn/open-apis"
reconnect_delay_ms = 3000
token_refresh_skew_seconds = 60
recent_event_limit = 20

[codex]
enabled = true
url = "${env.CODEX_URL:-ws://127.0.0.1:4500}"
model = "gpt-5.4"
effort = "medium"
cwd = "${env.CODEX_CWD:-../../codex/default}"
approval_policy = "untrusted"
sandbox = "workspace-write"
reconnect_delay_ms = 3000
flush_interval_ms = 400

[feishu.bridge]
enabled = true
ws_url = "${env.VHTTPD_BRIDGE_WS_URL:-ws://127.0.0.1:19884/bridge/ws}"
client_id = "local-main"
token = "${env.VHTTPD_BRIDGE_TOKEN:-change-me}"

[sites.codexbot]
host = "127.0.0.1"
port = 19883
root = "examples/codexbot-app-ts"
executor = "vjsx"
app = "${paths.vjsx_app}"
vjsx.build_root = "${paths.vjsx_build_root}"
vjsx.runtime_profile = "node"
vjsx.thread_count = 2
vjsx.enable_fs = true
feishu.enabled = true
