[paths]
root = "../../"
vjsx_app = "${root}/examples/paseo-relay/app.mts"
vjsx_build_root = "${root}/tmp/paseo-relay-vjsx-build-no-sticky"

[files]
pid_file = "${paths.root}/tmp/vhttpd_paseo_relay_19931.pid"
event_log = "${paths.root}/tmp/vhttpd_paseo_relay_19931.events.ndjson"

[runtime]
timezone = "Asia/Shanghai"

[worker]
websocket_dispatch = true

[admin]
host = "127.0.0.1"
port = 20031
token = "change-me"

[sites.paseo_relay]
host = "0.0.0.0"
port = 19931
root = "${paths.root}/examples/paseo-relay"
executor = "vjsx"
app = "${paths.vjsx_app}"
websocket_affinity.enabled = false
websocket_actor.enabled = true
websocket_actor.fallback = "unkeyed"
websocket_actor.queue_timeout_ms = 30000
websocket_actor.max_queue_per_key = 1024
websocket_actor.events = ["open", "message", "close", "info"]
websocket_actor.sources = [
  { type = "connection_cache" },
  { type = "query", key = "connectionId", class = "conn" },
  { type = "app" },
]
vjsx.build_root = "${paths.vjsx_build_root}"
vjsx.runtime_profile = "node"
vjsx.thread_count = 4
