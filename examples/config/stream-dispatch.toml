[server]
host = "127.0.0.1"
port = 19893

[files]
pid_file = "/tmp/vhttpd_stream_dispatch.pid"
event_log = "/tmp/vhttpd_stream_dispatch.ndjson"

[worker]
autostart = true
read_timeout_ms = 60000
pool_size = 1
stream_dispatch = true
socket = "/tmp/vhttpd_stream_dispatch_worker.sock"
cmd = "php /Users/guweigang/Source/vhttpd/php/package/bin/php-worker"

[worker.env]
VHTTPD_APP = "/Users/guweigang/Source/vhttpd/examples/stream-dispatch-app.php"

[admin]
host = "127.0.0.1"
port = 19993
token = ""

[assets]
enabled = false
prefix = "/assets"
root = "/Users/guweigang/Source/vhttpd/examples/public"
cache_control = "public, max-age=3600"
