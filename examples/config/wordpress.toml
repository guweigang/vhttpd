[server]
host = "127.0.0.1"
port = 19887

[files]
pid_file = "/tmp/vhttpd_wordpress.pid"
event_log = "/tmp/vhttpd_wordpress.events.ndjson"

[worker]
autostart = true
read_timeout_ms = 3000
socket = "/tmp/vslim_wordpress.sock"
cmd = "php -d extension=/Users/guweigang/Source/vphpx/vslim/vslim.so /Users/guweigang/Source/vhttpd/php/package/bin/php-worker"

[worker.env]
VHTTPD_APP = "/Users/guweigang/Source/vhttpd/examples/wordpress/app.php"
VSLIM_WP_ROOT = "/ABS/PATH/TO/WORDPRESS"

[admin]
host = "127.0.0.1"
port = 19987
token = ""
