[paths]
root = "../../"
feishu_vjsx_app = "examples/feishu_cb-app-ts/app.mts"
feishu_vjsx_build_root = "tmp/feishu-cb-vjsx-build"
paseo_vjsx_app = "examples/paseo-relay/app.mts"
paseo_vjsx_build_root = "tmp/paseo-relay-vjsx-build"

[files]
pid_file = "tmp/vhttpd_feishu_paseo.pid"
event_log = "tmp/vhttpd_feishu_paseo.events.ndjson"

[runtime]
timezone = "Asia/Shanghai"

[worker]
websocket_dispatch = true

[admin]
host = "127.0.0.1"
port = 20001
token = "change-me"

[feishu]
enabled = true
open_base_url = "https://open.feishu.cn/open-apis"
reconnect_delay_ms = 3000
token_refresh_skew_seconds = 60
recent_event_limit = 20
app_id = "${env.FEISHU_APP_ID:-}"
app_secret = "${env.FEISHU_APP_SECRET:-}"
verification_token = "${env.FEISHU_VERIFICATION_TOKEN:-}"
encrypt_key = "${env.FEISHU_ENCRYPT_KEY:-}"

[feishu.bridge]
enabled = true
token = "${env.VHTTPD_BRIDGE_TOKEN:-change-me}"
target_id = "local-main"

[sites.feishu_cb]
host = "0.0.0.0"
port = 19884
root = "examples/feishu_cb-app-ts"
executor = "vjsx"
app = "${paths.feishu_vjsx_app}"
vjsx.build_root = "${paths.feishu_vjsx_build_root}"
vjsx.runtime_profile = "node"
vjsx.thread_count = 1
vjsx.enable_fs = false

[sites.paseo_relay]
host = "0.0.0.0"
port = 19901
root = "examples/paseo-relay"
executor = "vjsx"
app = "${paths.paseo_vjsx_app}"
websocket_affinity.enabled = true
websocket_affinity.source = "query"
websocket_affinity.key = "serverId"
websocket_affinity.scope = "lane"
websocket_affinity.fallback = "reject"
vjsx.build_root = "${paths.paseo_vjsx_build_root}"
vjsx.runtime_profile = "node"
vjsx.thread_count = 4
